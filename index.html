<!DOCTYPE html>
<html lang="es">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Qué Colombia quieres? · 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--crema:#FDF8EE;--gris:#2C2C2C;--gc:#E8E3D9;--azul:#003087;--am:#F5C800}
body{font-family:'DM Sans',sans-serif;background:var(--crema);color:var(--gris);min-height:100vh;overflow-x:hidden}
.screen{display:none;animation:fu .4s ease}.screen.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.land{min-height:100vh;display:flex;flex-direction:column;background:var(--azul)}
.flag{height:6px;background:linear-gradient(90deg,#F5C800 33%,#003087 33%,#003087 66%,#CE1126 66%)}
.land-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:48px 28px;max-width:640px;margin:0 auto;width:100%}
.badge{display:inline-block;background:var(--am);color:var(--azul);font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;padding:5px 14px;border-radius:2px;margin-bottom:24px}
.land h1{font-family:'Fraunces',serif;font-size:clamp(2.2rem,7vw,3.5rem);font-weight:900;color:#fff;line-height:1.05;margin-bottom:20px}
.land h1 em{color:var(--am);font-style:italic}
.land-body>p{color:rgba(255,255,255,.75);font-size:15px;line-height:1.65;margin-bottom:24px;max-width:480px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.chip{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;padding:6px 14px;border-radius:99px}
.btn{background:var(--am);color:var(--azul);border:none;padding:18px 40px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;width:100%;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.dato{display:flex;gap:14px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--gc)}
.dato:last-of-type{border-bottom:none;margin-bottom:4px}
.di{font-size:1.4rem;flex-shrink:0;margin-top:2px}
.si{min-height:100vh;display:flex;flex-direction:column}
.si-hero{padding:52px 28px 36px;color:#fff;flex-shrink:0}
.si-num{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;opacity:.65;margin-bottom:12px}
.si-emoji{font-size:3rem;margin-bottom:14px;display:block}
.si-hero h2{font-family:'Fraunces',serif;font-size:clamp(1.8rem,5vw,2.6rem);font-weight:900;line-height:1.1;margin-bottom:10px}
.si-hero p{font-size:14px;opacity:.82;line-height:1.6;max-width:480px}
.si-hero *{color:#fff!important}
.si-hero .si-num,.si-hero p{opacity:.85}
.datos{background:#fff;flex:1;padding:28px;max-width:640px;margin:0 auto;width:100%}
.datos,.datos *{color:var(--gris)}
.datos h3{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#aaa!important;margin-bottom:18px}
.dn{font-family:'Fraunces',serif;font-size:1.15rem;font-weight:700;margin-bottom:2px;color:var(--gris)!important}
.dd{font-size:13px;color:#555!important;line-height:1.5}
.btn{background:var(--am);color:#fff!important;border:none;padding:18px 40px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;width:100%;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.tbar{background:#fff;border-bottom:1px solid var(--gc);padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.tbar-t{font-size:12px;font-weight:600;white-space:nowrap;min-width:90px}
.po{flex:1;height:5px;background:var(--gc);border-radius:99px;overflow:hidden}
.pi{height:100%;border-radius:99px;transition:width .4s ease}
.qw{max-width:640px;margin:0 auto;padding:24px 20px 72px}
.qcard{background:#fff;border:1px solid var(--gc);border-radius:12px;padding:22px;margin-bottom:16px;animation:fu .35s ease both}
.qn{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.qt{font-size:.95rem;font-weight:500;line-height:1.55;margin-bottom:12px}
.ctx{margin-bottom:14px;border-radius:8px;overflow:hidden;border:1px solid #e5e5e5}
.ctx-row{display:flex;gap:10px;padding:9px 12px;font-size:12px;line-height:1.45;align-items:flex-start}
.ctx-row:not(:last-child){border-bottom:1px solid #f0f0f0}
.ctx-row.c0{background:#f5f7fa}.ctx-row.c1{background:#fffbeb}.ctx-row.c2{background:#fef2f2}
.ctx-label{font-weight:700;flex-shrink:0;font-size:10px;letter-spacing:.5px;text-transform:uppercase;margin-top:1px;min-width:52px}
.ctx-row.c0 .ctx-label{color:#374151}.ctx-row.c1 .ctx-label{color:#92400e}.ctx-row.c2 .ctx-label{color:#991b1b}
.ctx-text{color:#444}
.opts{display:flex;flex-direction:column;gap:8px}
.ol{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid var(--gc);border-radius:8px;cursor:pointer;transition:all .15s;user-select:none}
.ol:hover{border-color:#bbb;background:#fafafa}
.ol.sel{border-color:var(--sc,#003087);background:color-mix(in srgb,var(--sc,#003087) 8%,#fff)}
.ol input{position:absolute;opacity:0;width:1px;height:1px;pointer-events:none}
.rd{width:18px;height:18px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;margin-top:1px;transition:all .15s;position:relative}
.ol.sel .rd{background:var(--sc,#003087);border-color:var(--sc,#003087)}
.ol.sel .rd::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#fff}
.ot{font-size:13.5px;line-height:1.45}
.nav{text-align:center;padding:14px 0 6px}
.btn-s{background:var(--sc,#003087);color:#fff;border:none;padding:16px 36px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;width:100%;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.btn-s:hover:not(:disabled){opacity:.9;transform:translateY(-1px)}
.btn-s:disabled{opacity:.4;cursor:not-allowed;transform:none}
.ac{font-size:11px;color:#bbb;margin-top:8px;text-align:center}
.work-pill{color:white;display:inline-block;padding:5px 14px;border-radius:99px;font-size:12px;font-weight:700;margin-bottom:20px}
.divider{border:none;border-top:2px dashed var(--gc);margin:24px 0}
.rw{max-width:640px;margin:0 auto;padding:28px 20px 72px}
.rh{border-radius:16px 16px 0 0;padding:36px 24px 28px;text-align:center;color:#fff}
.re{font-size:3.2rem;margin-bottom:12px;display:block}
.rb{display:inline-block;background:rgba(255,255,255,.2);color:#fff;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:5px 14px;border-radius:2px;margin-bottom:14px}
.rh h2{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:900;margin-bottom:10px;line-height:1.15}
.rh p{font-size:13.5px;opacity:.85;line-height:1.65;max-width:420px;margin:0 auto}
.raxes,.rcand,.rimp,.rcmp,.rwork{background:#fff;border:1px solid var(--gc);border-top:none;padding:22px 24px}
.raxes h3,.rcand h3,.rimp h3,.rcmp h3,.rwork h3{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#aaa;margin-bottom:16px}
.ax{margin-bottom:18px}
.axl{display:flex;justify-content:space-between;font-size:11px;color:#888;font-weight:500;margin-bottom:6px}
.axo{height:10px;border-radius:99px;overflow:visible;position:relative}
.axo-track{height:10px;border-radius:99px;width:100%;position:relative}
.ax-marker{position:absolute;top:50%;transform:translate(-50%,-50%);width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid #333;box-shadow:0 2px 8px rgba(0,0,0,.25);transition:left 1.2s cubic-bezier(.16,1,.3,1);left:50%;z-index:2}
.ax-val{font-size:11px;font-weight:700;color:#555;text-align:center;margin-top:6px}
.cc{border-radius:10px;padding:16px;display:flex;gap:14px;align-items:flex-start}
.ci{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:.85rem;font-weight:900;color:#fff;flex-shrink:0}
.cn{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;margin-bottom:3px}
.cr{font-size:12.5px;color:#555;line-height:1.5}
.rimp{background:#0f172a}
.rimp h3{color:rgba(255,255,255,.45)}
.ib{display:flex;gap:10px;margin-top:10px;align-items:flex-start}
.ib span:first-child{font-size:1rem;flex-shrink:0;margin-top:1px}
.ib span:last-child{font-size:13px;color:rgba(255,255,255,.82);line-height:1.5}
.rcmp{border-radius:0 0 16px 16px}
.cmp-card{border:1.5px solid var(--gc);border-radius:10px;padding:16px;margin-bottom:12px}
.cmp-card:last-child{margin-bottom:0}
.cmp-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.cmp-ini{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:.75rem;font-weight:900;color:#fff;flex-shrink:0}
.cmp-name{font-weight:700;font-size:.9rem}
.cmp-pct{font-size:11px;color:#aaa}
.cmp-rows{display:flex;flex-direction:column;gap:6px}
.cmp-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;line-height:1.4}
.cmp-icon{flex-shrink:0;font-size:.85rem;margin-top:1px}
.rwork{background:#f8fafc}
.work-tag{display:inline-flex;align-items:center;gap:6px;background:var(--azul);color:#fff;font-size:12px;font-weight:600;padding:6px 14px;border-radius:99px;margin-bottom:16px}
.disc{text-align:center;font-size:11px;color:#aaa;margin-top:18px;line-height:1.5}
@media(max-width:480px){.land-body,.si-hero{padding:36px 20px 28px}.datos,.qw,.rw{padding:18px 14px}.qcard{padding:18px}}

@media print {
  body { background: #fff !important; }
  .tbar, .land, .si, .qw, .nav, .btn-s, .disc, #restart-btn { display: none !important; }
  .rw { padding: 0 !important; max-width: 100% !important; }
  .rh { border-radius: 8px !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .raxes, .rcand, .rimp, .rcmp, .rwork { border: 1px solid #ddd !important; page-break-inside: avoid; }
  .rimp { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .axi { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .cmp-card { page-break-inside: avoid; }
  .screen { display: block !important; }
  #resultado-wrap { display: block !important; }
}
</style>
</head>

{id:'econ',titulo:'Economía',emoji:'📊',color:'#92400e',num:'03 de 07',

{id:'salud',titulo:'Salud',emoji:'🏥',color:'#9b1c1c',num:'04 de 07',

let S={
 scores:{paz:5,econ:5,salud:5,agro:5,amb:5},
 qScores:{},secDone:{},voto:null,
 workStatus:null,workSector:null,workStability:null,
};
// SECS[0]=paz, SECS[1]=econ, SECS[2]=salud, SECS[3]=agro, SECS[4]=amb
// Flow: paz → workProfile → workCond → econ → salud → agro → amb → vote → result
const TOTAL_Q = SECS.reduce((a,s)=>a+s.qs.length,0) + 3 + 3 + 3; // +work profile +work cond +vote
function totalAnswered(){return Object.values(S.secDone).reduce((a,b)=>a+b,0)}

const app=document.getElementById('app');
function R(html){app.innerHTML=html;window.scrollTo(0,0)}

function topBar(title,color){
 const pct=Math.round(totalAnswered()/TOTAL_Q*100);
 return`<div class="tbar"><span class="tbar-t" style="color:${color}">${title}</span><div class="po"><div class="pi" id="pi" style="background:${color};width:${pct}%"></div></div></div>`;
}
function updProg(answered,total,key){
 S.secDone[key]=answered;
 const pct=Math.round(totalAnswered()/TOTAL_Q*100);
 const pi=document.getElementById('pi');if(pi)pi.style.width=pct+'%';
 const btn=document.getElementById('bnext'),ac=document.getElementById('ac');
 const rem=total-answered;
 if(answered>=total){if(btn)btn.disabled=false;if(ac)ac.textContent='✓ Todo respondido — puedes continuar';}
 else{if(btn)btn.disabled=true;if(ac)ac.textContent=`Responde ${rem} pregunta${rem>1?'s':''} más para continuar`;}
}

function showQs(idx){
 S.secIdx=idx;const sec=SECS[idx];
 // After paz(0) → work; after amb(4) → vote; otherwise next sec
 let nextFn,nextLabel;
 if(idx===SECS.length-1){nextFn='showVote()';nextLabel='Ver mi voto y candidatos →';}
 else if(idx===0){nextFn='showWorkIntro()';nextLabel='Siguiente: Tu Trabajo →';}
 else{nextFn=`showIntro(${idx+1})`;nextLabel=`Siguiente: ${SECS[idx+1].titulo} →`;}

 R(`<div class="screen on">${topBar(sec.emoji+' '+sec.titulo,sec.color)}
  <div class="qw">
   ${sec.qs.map((q,qi)=>`
    <div class="qcard" style="animation-delay:${qi*.06}s">
     <div class="qn" style="color:${sec.color}">${sec.emoji} Pregunta ${q.n}</div>
     <div class="qt">${q.t}</div>
     <div class="ctx">
      <div class="ctx-row c0"><span class="ctx-label">Contexto</span><span class="ctx-text">${q.ctx[0]}</span></div>
      <div class="ctx-row c1"><span class="ctx-label">Hoy</span><span class="ctx-text">${q.ctx[1]}</span></div>
      <div class="ctx-row c2"><span class="ctx-label">Si sigue</span><span class="ctx-text">${q.ctx[2]}</span></div>
     </div>
     <div class="opts" data-si="${idx}" data-qi="${qi}">
      ${q.ops.map((op,oi)=>`
       <label class="ol" style="--sc:${sec.color}">
        <input type="radio" name="${sec.id}_q${qi}" value="${oi}">
        <div class="rd"></div><span class="ot">${op.t}</span>
       </label>`).join('')}
     </div>
    </div>`).join('')}
   <div class="nav">
    <button class="btn-s" id="bnext" style="background:${sec.color}" onclick="${nextFn}" disabled>${nextLabel}</button>
    <div class="ac" id="ac">Responde las ${sec.qs.length} preguntas para continuar</div>
   </div>
  </div>
 </div>`);

 document.querySelectorAll('.opts').forEach(grp=>{
  const si=parseInt(grp.dataset.si),qi=parseInt(grp.dataset.qi),s2=SECS[si];
  grp.querySelectorAll('.ol').forEach(label=>{
   label.addEventListener('click',()=>{
    const inp=label.querySelector('input[type="radio"]');
    if(!inp)return;
    grp.querySelectorAll('.ol').forEach(l=>l.classList.remove('sel'));
    label.classList.add('sel');
    inp.checked=true;
    const key=s2.id+'_q'+qi,oi=parseInt(inp.value);
    if(S.qScores[key])Object.entries(S.qScores[key]).forEach(([ax,d])=>{S.scores[ax]=Math.max(0,Math.min(10,S.scores[ax]-d));});
    const ns=s2.qs[qi].ops[oi].s;S.qScores[key]=ns;
    Object.entries(ns).forEach(([ax,d])=>{if(S.scores[ax]!==undefined)S.scores[ax]=Math.max(0,Math.min(10,S.scores[ax]+d));});
    updProg(document.querySelectorAll('.opts input:checked').length,s2.qs.length,s2.id);
   });
  });
 });
}

function getProfile(){
 const{paz,econ,salud,agro,amb}=S.scores;
 if(agro<=3&&(paz<=5||econ>=6))return'agrarista';
 if(paz>=7&&amb>=7&&econ<=5)return'prog_amb';
 if(paz>=6&&econ<=5&&amb>=4)return'prag_izq';
 if(paz<=3&&econ>=7)return'der_clas';
 if(paz<=4&&amb<=4)return'der_pop';
 if(amb>=7&&econ>=5)return'ecoreal';
 if(Math.abs(paz-5)<=2&&Math.abs(econ-5)<=2&&Math.abs(amb-5)<=2)return'centro';
 return'lib_mod';
}

function candCmp(ckey){
 const axes=[
  {k:'paz',score:S.scores.paz,lbl:'Paz y seguridad'},
  {k:'econ',score:S.scores.econ,lbl:'Economía'},
  {k:'salud',score:S.scores.salud,lbl:'Salud'},
  {k:'agro',score:S.scores.agro,lbl:'Agricultura'},
  {k:'amb',score:S.scores.amb,lbl:'Ambiente y energía'},
 ];
 return axes.map(ax=>{
  const pos=CANDS[ckey].pos[ax.k];
  const rawDir=ax.score>6?1:(ax.score<4?-1:0);
  const userPref=(ax.k==='econ'||ax.k==='salud')?-rawDir:rawDir;
  let icon,color,txt;
  if(rawDir===0){icon='⚪';color='#9ca3af';txt='Posición neutral — no hay diferencia significativa para ti aquí.';}
  else if(userPref===pos.dir){icon='✅';color='#15803d';txt=pos.b;}
  else if(pos.dir===0){icon='🔶';color='#b45309';txt='Propuesta poco definida — riesgo de ejecución incierta.';}
  else{icon='⚠️';color='#b91c1c';txt=pos.m;}
  return`<div class="cmp-row"><span class="cmp-icon">${icon}</span><span style="color:${color}"><strong>${ax.lbl}:</strong> ${txt}</span></div>`;
 }).join('');
}

// Calcula el candidato más coherente con los scores por alineación numérica real
function bestCandByScore(){
 const{paz,econ,salud,agro,amb}=S.scores;
 // Para cada candidato suma "puntos de alineación" por eje
 // dirección del candidato: 1=izq/paz/público/reforma/conserv, -1=der/guerra/privado/agro/extrac, 0=neutro
 // dirección del usuario: alto score en paz=pacifista(+), alto econ=mercado(-), alto salud=privado(-), alto agro=agro(+?), alto amb=conserv(+)
 // Convertimos score a dirección: >6→+1, <4→-1, medio→0
 // Luego comparamos con la posición del candidato en ese eje
 const userDir={
  paz: paz>6?1:(paz<4?-1:0),
  econ: econ>6?-1:(econ<4?1:0),   // alto econ=mercado → quiere candidato dir -1
  salud: salud>6?-1:(salud<4?1:0), // alto salud=privado → quiere candidato dir -1
  agro: agro>6?1:(agro<4?-1:0),    // alto agro=agroindustria → quiere candidato dir +1... wait
  amb: amb>6?1:(amb<4?-1:0),       // alto amb=conservacionista → quiere candidato dir +1
 };
 // Note: agro score high = agroindustria (right), low = reforma. So userDir agro: high→wants cand dir +1 (pro-agro)
 // But cand pos dir for agro: +1=reforma, -1=agro... let's check CANDS: cepeda agro dir:-1 = reforma activa
 // Wait in CANDS: cepeda agro dir=-1 means state/reform. paloma agro dir=+1 means agro industry.
 // So high agro score (user wants agroindustria) → wants cand dir +1 → paloma ✓
 // Low agro score (user wants reform) → wants cand dir -1 → cepeda ✓ — logic is consistent

 const scores={};
 Object.entries(CANDS).forEach(([k,c])=>{
  let pts=0;
  Object.entries(userDir).forEach(([ax,ud])=>{
   const cd=c.pos[ax]?.dir??0;
   if(ud===0) return; // user neutral → skip
   if(ud===cd) pts+=2;       // full alignment
   else if(cd===0) pts+=0;   // cand neutral → partial
   else pts-=1;              // misalignment
  });
  scores[k]=pts;
 });
 // Return key with highest score
 return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

 });

 const mismatch=S.voto&&S.voto!=='blanco'&&S.voto!==recKey;

 return {
  generado_en: new Date().toISOString(),
  fuente_datos: 'Invamer 21 mayo 2026',
  perfil_politico:{
   nombre: pf.n,
   emoji: pf.e,
   descripcion: pf.d,
   impacto_dia_a_dia: pf.imp.map(i=>i.t),
  },
  contexto_laboral:{
   situacion: SECTOR_LABELS[S.workStatus]||'No especificado',
   sector: SECTOR_LABELS[S.workSector]||'No especificado',
   estabilidad_percibida: S.workStability==='3'?'Muy estable':S.workStability==='2'?'Estable':S.workStability==='1'?'Inestable':'Muy inestable',
  },
  ejes_de_valores:{
   paz_vs_mano_dura:{ score:paz, de_10:true, interpretacion: axLabels.paz },
   mas_estado_vs_mercado:{ score:econ, de_10:true, interpretacion: axLabels.econ },
   salud_publica_vs_privada:{ score:salud, de_10:true, interpretacion: axLabels.salud },
   reforma_agraria_vs_agroindustria:{ score:agro, de_10:true, interpretacion: axLabels.agro },
   extractivista_vs_conservacionista:{ score:amb, de_10:true, interpretacion: axLabels.amb },
  },
  candidato_mas_alineado:{
   nombre: CANDS[recKey].n,
   partido: CANDS[recKey].p,
   porcentaje_invamer: CANDS[recKey].pct,
   razon: CANDS[recKey].r,
   calculado_por: 'Alineación numérica entre scores del usuario y posiciones del candidato en 5 ejes',
  },
  voto_declarado: S.voto&&S.voto!=='blanco'?{
   nombre: CANDS[S.voto]?.n||'Voto en blanco',
   partido: CANDS[S.voto]?.p||'—',
   coincide_con_recomendacion: !mismatch,
   nota: mismatch?'Existe discrepancia entre tu voto declarado y el candidato más alineado con tus respuestas':'Tu voto declarado coincide con el candidato más alineado con tus respuestas',
  }:{nombre:'No declarado o voto en blanco', coincide_con_recomendacion:null},
  respuestas_por_bloque: respuestas,
 };
}

function generateResultImage() {
  const resultBlock = document.querySelector('.rw');
  if (!resultBlock) return;

  html2canvas(resultBlock, { scale: 2, useCORS: true }).then(canvas => {
    const dataUrl = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = 'resultado_colombia2026.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
}

function downloadJSON(){
 const data=generateResultJSON();
 const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');
 a.href=url; a.download='mi_perfil_politico_colombia2026.json';
 document.body.appendChild(a); a.click();
 document.body.removeChild(a); URL.revokeObjectURL(url);
}

 S={scores:{paz:5,econ:5,salud:5,agro:5,amb:5},qScores:{},secDone:{},voto:null,workStatus:null,workSector:null,workStability:null};
 showLanding();
}
showLanding();
